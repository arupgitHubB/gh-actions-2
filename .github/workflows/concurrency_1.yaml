name: concurrency
on:
    push:
    workflow_dispatch:

jobs:
    trigger_job:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout the repo
          uses: actions/checkout@v6
        - name: Welcome message
          run: echo "Cheers to github Actions learning !!"
        - name: Listing files
          run: ls -lart
        - name: Read README
          run: cat README.md
        - name: print time
          run: date
    deploy_job:
        needs:
          - trigger_job
        concurrency:
          group: prod-deployment
          cancel-in-progress: false
        runs-on: ubuntu-latest
        steps:
        - name: Checkout the repo
          uses: actions/checkout@v6
        - name: Print message
          run: echo "Deploying... Hang on !!"
        - name: sleeping
          run: sleep 180